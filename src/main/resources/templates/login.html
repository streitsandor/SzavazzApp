<!doctype html>
<html lang="hu" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SzavazzApp - Bejelentkezés</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/global.css}" rel="stylesheet">
    <link th:href="@{/css/login.css}" rel="stylesheet">
</head>

<body class="login-page">
    <main class="container">
        <div class="row min-vh-100 align-items-center justify-content-center">
            <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">
                <div class="card app-card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <div class="app-logo mx-auto mb-3">
                                <i class="fa-solid fa-check-to-slot"></i>
                            </div>
                            <h1 class="h3 mb-1">SzavazzApp</h1>
                            <p class="text-muted mb-0">Bejelentkezés a felületre</p>
                        </div>

                        <div th:if="${param.error}" class="alert alert-danger" role="alert">
                            Hibás felhasználónév vagy jelszó.
                        </div>

                        <div th:if="${param.logout}" class="alert alert-success" role="alert">
                            Sikeres kijelentkezés.
                        </div>

                        <form th:action="@{/login}" method="post" autocomplete="off">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                            <div class="mb-3">
                                <label for="username" class="form-label">Név</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                                    <input id="username" name="username" type="text" class="form-control" placeholder="Felhasználónév" required autofocus>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label">Jelszó</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                                    <input id="password" name="password" type="password" class="form-control" placeholder="Jelszó" required>
                                    <button class="btn btn-outline-secondary" type="button" id="togglePassword" aria-label="Jelszó mutatása vagy elrejtése">
                                        <i class="fa-solid fa-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fa-solid fa-right-to-bracket me-2"></i>Belépés
                            </button>
                        </form>

                        <div class="small text-muted mt-4 mb-0">
                            Teszt felhasználó: <code>user / user123</code><br>
                            Admin teszt: <code>admin / admin123</code>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/global.js}"></script>
    <script th:src="@{/js/login.js}"></script>
</body>

</html>
