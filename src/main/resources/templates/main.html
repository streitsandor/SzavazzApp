<!doctype html>
<html lang="hu" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SzavazzApp - Főoldal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/global.css}" rel="stylesheet">
    <link th:href="@{/css/main.css}" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-white border-bottom app-navbar">
        <div class="container">
            <a class="navbar-brand fw-semibold" th:href="@{/main}">
                <i class="fa-solid fa-check-to-slot me-2 text-primary"></i>SzavazzApp
            </a>

            <div class="d-flex align-items-center gap-3 ms-auto">
                <span class="text-muted small">
                    <i class="fa-solid fa-user me-1"></i>
                    <span th:text="${username}">user</span>
                </span>

                <form th:action="@{/logout}" method="post" class="m-0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-outline-secondary btn-sm">
                        <i class="fa-solid fa-right-from-bracket me-1"></i>Kilépés
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-9 col-xl-8">
                <div class="mb-4">
                    <h1 class="h3 mb-2">Főoldal</h1>
                </div>

                <div class="card app-card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <div class="d-flex align-items-start gap-3 mb-4">
                            <div th:classappend="${databaseStatus.connected} ? ' status-icon-success' : ' status-icon-danger'" class="status-icon">
                                <i th:class="${databaseStatus.connected} ? 'fa-solid fa-circle-check' : 'fa-solid fa-circle-xmark'"></i>
                            </div>
                            <div>
                                <h2 class="h5 mb-1">Adatbázis kapcsolat teszt</h2>
                                <p th:class="${databaseStatus.connected} ? 'text-success mb-0' : 'text-danger mb-0'" th:text="${databaseStatus.message}">
                                    Kapcsolati állapot
                                </p>
                            </div>
                        </div>

                        <div th:if="${databaseStatus.connected}" class="table-responsive">
                            <table class="table table-sm align-middle mb-0">
                                <tbody>
                                    <tr>
                                        <th>Teszt lekérdezés</th>
                                        <td><code>SELECT 1</code> → <code th:text="${databaseStatus.testValue}">1</code>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <div th:unless="${databaseStatus.connected}" class="alert alert-danger mb-0">
                            <div class="fw-semibold mb-1">Hiba részlete:</div>
                            <code th:text="${databaseStatus.error}">Kapcsolódási hiba</code>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/main.js}"></script>
</body>

</html>
